services:
  # ── Streamlit web app ────────────────────────────────────────────────────
  - type: web
    name: inco-staff-portal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_app/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: SUPABASE_URL
        sync: false          # set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false          # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INCO_O365_CLIENT_ID
        sync: false
      - key: INCO_O365_CLIENT_SECRET
        sync: false
      - key: INCO_O365_TENANT_ID
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false

  # ── Background email poller ───────────────────────────────────────────────
  - type: worker
    name: inco-email-poller
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: INCO_O365_CLIENT_ID
        sync: false
      - key: INCO_O365_CLIENT_SECRET
        sync: false
      - key: INCO_O365_TENANT_ID
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
